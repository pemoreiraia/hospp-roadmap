// ─── STORAGE ─────────────────────────────────────────────────
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v)  => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── TRELLO PARSER ───────────────────────────────────────────
function parseTrelloJSON(json) {
  const board = typeof json === "string" ? JSON.parse(json) : json;
  const lists = {};
  (board.lists || []).forEach(l => { lists[l.id] = l.name; });

  const PRIORITY_MAP = { "[PRI] Crítica":"critical", "[PRI] Alta":"high", "[PRI] Média":"medium", "[PRI] Baixa":"low" };
  const GROUP_MAP = {};

  return (board.cards || [])
    .filter(c => !c.closed && !c.archived)
    .map(c => {
      const labels = (c.labels || []).map(l => l.name || "");
      let priority = "medium";
      let group = lists[c.idList] || "Backlog";

      labels.forEach(l => {
        if (PRIORITY_MAP[l]) priority = PRIORITY_MAP[l];
        if (l.startsWith("[FTR]")) group = l.replace("[FTR]","").trim();
      });

      // Try to infer group from list name
      const listName = lists[c.idList] || "";
      if (!GROUP_MAP[c.idList]) group = listName;

      return {
        id: `trello-${c.id}`,
        source: "trello",
        title: c.name,
        description: c.desc || "",
        group,
        priority,
        startMonth: 1,
        endMonth: 2,
        trelloUrl: c.shortUrl || c.url || "",
        labels,
        listName,
      };
    });
}

// ─── ARROW LAYER ─────────────────────────────────────────────
function Arrows({ frentes, refs, show, hov }) {
  const [paths, setPaths] = useState([]);

  const compute = useCallback(() => {
    if (!show) { setPaths([]); return; }
    const cont = document.querySelector(".fb-scroll");
    if (!cont) return;
    const cr = cont.getBoundingClientRect();
    const sl = cont.scrollLeft, st = cont.scrollTop;
    const res = [];
    frentes.forEach(f => f.dependeDe.forEach(dep => {
      const a = refs.current[dep], b = refs.current[f.id];
      if (!a || !b) return;
      const ar = a.getBoundingClientRect(), br = b.getBoundingClientRect();
      res.push({
        fid: dep, tid: f.id,
        x1: ar.right - cr.left + sl, y1: ar.top + ar.height / 2 - cr.top + st,
        x2: br.left  - cr.left + sl, y2: br.top + br.height / 2 - cr.top + st,
      });
    }));
    setPaths(res);
  }, [frentes, show, refs]);

  useEffect(() => {
    const timer = setTimeout(compute, 80);
    window.addEventListener("resize", compute);
    return () => { clearTimeout(timer); window.removeEventListener("resize", compute); };
  }, [compute]);

  if (!show || !paths.length) return null;

  return (
    <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:10,overflow:"visible"}}>
      <defs>
        {[["n","#94a3b8"],["f","#3b82f6"],["t","#f59e0b"]].map(([k,c]) => (
          <marker key={k} id={`m${k}`} markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill={c}/>
          </marker>
        ))}
      </defs>
      {paths.map((p, i) => {
        const hf = hov === p.fid, ht = hov === p.tid, hi = hf || ht;
        const dx = Math.abs(p.x2 - p.x1) * 0.4;
        return (
          <path key={i}
            d={`M${p.x1},${p.y1} C${p.x1+dx},${p.y1} ${p.x2-dx},${p.y2} ${p.x2},${p.y2}`}
            fill="none"
            stroke={hf ? "#3b82f6" : ht ? "#f59e0b" : "#cbd5e1"}
            strokeWidth={hi ? 2 : 1}
            strokeDasharray={hi ? "none" : "4 3"}
            markerEnd={hf ? "url(#mf)" : ht ? "url(#mt)" : "url(#mn)"}
            opacity={hi ? 1 : 0.45}
            style={{transition:"stroke .15s,opacity .15s"}}
          />
        );
      })}
    </svg>
  );
}

// ─── FRENTE CARD ─────────────────────────────────────────────
function FCard({ f, g, all, refs, hov, setHov, onEdit, onDel, onDrill, dragH }) {
  const rs = RISCO_S[f.risco] || RISCO_S.MEDIO;
  const ps = PRIOR_S[f.prioridade] || PRIOR_S.MEDIA;

  return (
    <div
      ref={el => refs.current[f.id] = el}
      draggable {...dragH(f)}
      onMouseEnter={() => setHov(f.id)}
      onMouseLeave={() => setHov(null)}

        background:"#fff",

        borderRadius:10, padding:"10px 12px", cursor:"grab", userSelect:"none", position:"relative",
        boxShadow: isH ? `0 4px 16px ${g.cor}30` : isDep ? "0 2px 8px #6366f120" : "0 1px 3px #0001",
        transition:"all .15s",
      }}
    >
      <div style={{display:"flex",gap:8,marginBottom:7}}>
        <div style={{width:26,height:26,borderRadius:7,background:g.cor,color:"#fff",fontWeight:800,fontSize:11,
          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{f.num}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:12.5,color:"#1e293b",lineHeight:1.3}}>{f.titulo}</div>
          <div style={{fontSize:10.5,color:"#64748b",marginTop:2,lineHeight:1.4,
            display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{f.desc}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:f.dependeDe.length?6:0}}>
        <span style={{fontSize:9.5,fontWeight:700,padding:"2px 6px",borderRadius:20,background:ps.bg,color:ps.text}}>{f.prioridade}</span>
        <span style={{fontSize:9.5,fontWeight:700,padding:"2px 6px",borderRadius:20,background:rs.bg,color:rs.text,
          display:"flex",alignItems:"center",gap:3}}>
          <span style={{width:4,height:4,borderRadius:"50%",background:rs.dot,display:"inline-block"}}/>
          {f.risco}
        </span>
      </div>
      {f.dependeDe.length > 0 && (
        <div style={{fontSize:9.5,color:"#94a3b8",borderTop:"1px solid #f1f5f9",paddingTop:5}}>
          <span style={{color:"#64748b",fontWeight:600}}>Dep: </span>
          {f.dependeDe.map(d => `#${d}`).join(", ")}
        </div>
      )}
      <div style={{position:"absolute",top:7,right:7,display:"flex",gap:3,opacity:isH?1:0,transition:"opacity .15s"}}>
        <button onClick={() => onDrill(f)} title="Detalhes / Roadmap"
          style={{width:22,height:22,borderRadius:5,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:11,color:"#1e293b",
          display:"flex",alignItems:"center",justifyContent:"center"}}>↗</button>
        <button onClick={() => onEdit(f)} title="Editar"
          style={{width:22,height:22,borderRadius:5,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:11,color:"#1e293b",
          display:"flex",alignItems:"center",justifyContent:"center"}}>✎</button>
        <button onClick={() => onDel(f.id)} title="Remover"

          display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
    </div>
  );
}

// ─── EDIT MODAL ──────────────────────────────────────────────

  const isNew = !f.id;
  const [form, setForm] = useState({ titulo:"", desc:"", grupo:1, prioridade:"ALTA", risco:"ALTO", dependeDe:[], ...f });

  return (
    <div style={{position:"fixed",inset:0,background:"#00000066",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:540,maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px #0003"}}>

          <button onClick={onClose} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}}>×</button>
        </div>
        <div style={{padding:"14px 22px",display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:3}}>Título *</label>
            <input value={form.titulo} onChange={e => set("titulo", e.target.value)}
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
          </div>
          <div>
            <label style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:3}}>Descrição</label>
            <textarea value={form.desc} onChange={e => set("desc", e.target.value)} rows={2}
              style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none",resize:"vertical"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[
              ["Grupo",      "grupo",      GRUPOS.map(g => ({ v:g.id, l:`G${g.id}` }))],
              ["Prioridade", "prioridade", ["ALTA","MEDIA","BAIXA"].map(v => ({ v, l:v }))],
              ["Risco",      "risco",      ["CRITICO","ALTO","MEDIO","BAIXO"].map(v => ({ v, l:v }))],
            ].map(([lbl, key, opts]) => (
              <div key={key}>
                <label style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:3}}>{lbl}</label>
                <select value={form[key]} onChange={e => set(key, key==="grupo" ? Number(e.target.value) : e.target.value)}
                  style={{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"6px 9px",fontSize:11}}>
                  {opts.map(o => <option key={String(o.v)} value={o.v}>{o.l}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div>
            <label style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",display:"block",marginBottom:5}}>Depende de</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {all.filter(x => x.id !== form.id).map(x => {
                const sel = form.dependeDe.includes(x.id);
                return (
                  <button key={x.id} onClick={() => tog(x.id)}
                    style={{padding:"3px 9px",borderRadius:20,fontSize:10.5,fontWeight:600,cursor:"pointer",
                      border: sel ? "1.5px solid #3b82f6" : "1.5px solid #e2e8f0",
                      background: sel ? "#eff6ff" : "#fff", color: sel ? "#1d4ed8" : "#64748b"}}>
                    #{x.num} {x.titulo.slice(0,18)}{x.titulo.length>18?"…":""}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
        <div style={{padding:"10px 22px 18px",display:"flex",justifyContent:"flex-end",gap:8,borderTop:"1px solid #f1f5f9"}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={() => {
            if (!form.titulo.trim()) return alert("Título obrigatório");
            onSave(form); onClose();

        </div>
      </div>
    </div>
  );
}

              {deps.map(d => {
                const dg = GRUPOS.find(x => x.id === d.grupo) || GRUPOS[0];

                );

          )}

// ─── ROADMAP BOARD ───────────────────────────────────────────
const COL_W = 72, LABEL_W = 260;

function RoadmapBoard({ items, onPatch }) {
  const [editCell, setEditCell] = useState(null);
  const [editVal,  setEditVal]  = useState("");
  const [dragOver, setDragOver] = useState(null);
  const dragId  = useRef(null);
  const mouseRef = useRef(null);

  const groups = useMemo(() => [...new Set(items.map(i => i.group || "Backlog"))], [items]);

  const startDrag = (e, item, type) => {
    e.preventDefault(); e.stopPropagation();
    const sx = e.clientX, os = item.startMonth, oe = item.endMonth;
    mouseRef.current = { id: item.id, type, sx, os, oe };
    const mv = ev => {
      if (!mouseRef.current) return;
      const { id, type: t, sx, os, oe } = mouseRef.current;
      const delta = Math.round((ev.clientX - sx) / COL_W);
      if (t === "move") {
        const ns = Math.max(1, Math.min(12, os + delta));
        onPatch(id, { startMonth: ns, endMonth: Math.min(12, ns + (oe - os)) });
      } else {
        onPatch(id, { endMonth: Math.max(os, Math.min(12, oe + delta)) });
      }
    };
    const up = () => { mouseRef.current = null; window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
  };

  if (items.length === 0) {
    return (
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"60px 20px",textAlign:"center",color:"#94a3b8"}}>
        <div style={{fontSize:36,marginBottom:12}}>📂</div>
        <div style={{fontWeight:700,fontSize:15,color:"#64748b",marginBottom:6}}>Nenhum card ainda</div>
        <div style={{fontSize:13}}>Importe o arquivo JSON do Trello para ver os cards aqui</div>
      </div>
    );
  }

  return (
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,overflow:"auto",maxHeight:"calc(100vh - 260px)"}}>
      <div style={{minWidth: LABEL_W + COL_W * 12}}>
        {/* Month header */}
        <div style={{display:"grid",gridTemplateColumns:`${LABEL_W}px repeat(12, ${COL_W}px)`,
          background:"#f8fafc",borderBottom:"2px solid #e2e8f0",position:"sticky",top:0,zIndex:5}}>
          <div style={{padding:"8px 14px",fontSize:10,fontWeight:700,color:"#94a3b8",
            textTransform:"uppercase",borderRight:"1px solid #e2e8f0"}}>Iniciativa</div>
          {MONTHS.map((m, i) => (
            <div key={m} style={{padding:"8px 4px",textAlign:"center",fontSize:10,fontWeight:700,
              borderRight:"1px solid #e2e8f0",
              color: i+1 === CURRENT_MONTH ? "#3b82f6" : "#94a3b8",
              background: i+1 === CURRENT_MONTH ? "#eff6ff" : undefined}}>
              {m}
              {i+1 === CURRENT_MONTH && <div style={{width:4,height:4,background:"#3b82f6",borderRadius:"50%",margin:"2px auto 0"}}/>}
            </div>
          ))}
        </div>

        {/* Groups */}
        {groups.map(grp => (
          <div key={grp}
            onDragOver={e => { e.preventDefault(); setDragOver(grp); }}
            onDragLeave={() => setDragOver(null)}
            onDrop={e => { e.preventDefault(); if (dragId.current) onPatch(dragId.current, { group: grp }); setDragOver(null); }}>

            {/* Group header */}
            <div style={{display:"grid",gridTemplateColumns:`${LABEL_W}px repeat(12, ${COL_W}px)`,
              background: dragOver===grp ? "#f0f9ff" : "#f8fafc",borderBottom:"1px solid #e2e8f0",minHeight:34}}>
              <div style={{padding:"7px 14px",display:"flex",alignItems:"center",gap:6,borderRight:"1px solid #e2e8f0"}}>
                <span style={{fontSize:10.5,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>{grp}</span>
                <span style={{fontSize:9,color:"#94a3b8"}}>({items.filter(i=>i.group===grp).length})</span>
                {dragOver===grp && <span style={{fontSize:9,color:"#3b82f6",fontWeight:600,marginLeft:4}}>↓ soltar aqui</span>}
              </div>
              {MONTHS.map((_, i) => (
                <div key={i} style={{borderRight:"1px solid #e2e8f0",
                  background: i+1===CURRENT_MONTH ? "#eff6ff22" : undefined}}/>
              ))}
            </div>

            {/* Item rows */}
            {items.filter(it => it.group === grp).map(item => {
              const pc = BAR_COLORS[item.priority] || BAR_COLORS.medium;
              const sc = SRC_S[item.source] || SRC_S.manual;
              return (
                <div key={item.id}
                  className="rm-row"
                  draggable
                  onDragStart={() => dragId.current = item.id}
                  onDragEnd={() => { dragId.current = null; setDragOver(null); }}
                  style={{display:"grid",gridTemplateColumns:`${LABEL_W}px repeat(12, ${COL_W}px)`,
                    borderBottom:"1px solid #f1f5f9",minHeight:50,cursor:"grab",background:"#fff"}}>

                  {/* Label */}
                  <div style={{padding:"8px 12px",borderRight:"1px solid #e2e8f0",display:"flex",
                    flexDirection:"column",justifyContent:"center",gap:4}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1e293b",lineHeight:1.3,
                      whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={item.title}>
                      {item.title}
                    </div>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:20,
                        background:sc.bg,color:sc.text,border:`1px solid ${sc.border}`}}>{sc.label}</span>

                      {editCell?.id === item.id && editCell.f === "priority" ? (
                        <select autoFocus value={editVal}
                          onChange={e => setEditVal(e.target.value)}
                          onBlur={() => { onPatch(item.id, { priority: editVal }); setEditCell(null); }}
                          style={{fontSize:9,border:"1px solid #e2e8f0",borderRadius:4,padding:"1px 4px"}}>
                          {["critical","high","medium","low"].map(p => <option key={p}>{p}</option>)}
                        </select>
                      ) : (
                        <span
                          onClick={() => { setEditCell({ id:item.id, f:"priority" }); setEditVal(item.priority); }}
                          title="Clique para editar"
                          style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:20,cursor:"pointer",
                            background: item.priority==="critical"?"#fef2f2":item.priority==="high"?"#fff7ed":item.priority==="low"?"#f0fdf4":"#eff6ff",
                            color: item.priority==="critical"?"#dc2626":item.priority==="high"?"#c2410c":item.priority==="low"?"#15803d":"#1d4ed8"}}>
                          {item.priority}
                        </span>
                      )}

                      {item.trelloUrl && (
                        <a href={item.trelloUrl} target="_blank" rel="noreferrer"
                          style={{fontSize:9,color:"#94a3b8",textDecoration:"none"}} title="Abrir no Trello">↗</a>
                      )}
                    </div>
                  </div>

                  {/* Timeline cells */}
                  {MONTHS.map((_, mi) => {
                    const mo = mi + 1;
                    const active = mo >= item.startMonth && mo <= item.endMonth;
                    const isS = mo === item.startMonth, isE = mo === item.endMonth;
                    return (
                      <div key={mi}
                        style={{borderRight:"1px solid #f1f5f9",display:"flex",alignItems:"center",padding:"0 2px",
                          background: mi+1===CURRENT_MONTH ? "#eff6ff22" : undefined}}>
                        {active && (
                          <div
                            onMouseDown={e => startDrag(e, item, "move")}
                            style={{height:26,width:"100%",background:pc,opacity:0.85,cursor:"grab",position:"relative",
                              borderRadius:`${isS?"6px":"0"} ${isE?"6px":"0"} ${isE?"6px":"0"} ${isS?"6px":"0"}`,
                              marginLeft:isS?2:0, marginRight:isE?2:0}}>
                            {isS && (
                              <span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",
                                fontSize:8,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",pointerEvents:"none"}}>
                                {item.endMonth > item.startMonth
                                  ? `${MONTHS[item.startMonth-1]}–${MONTHS[item.endMonth-1]}`
                                  : MONTHS[item.startMonth-1]}
                              </span>
                            )}
                            {isE && (
                              <div
                                onMouseDown={e => { e.stopPropagation(); startDrag(e, item, "resize"); }}
                                style={{position:"absolute",right:0,top:0,bottom:0,width:10,cursor:"ew-resize",
                                  display:"flex",alignItems:"center",justifyContent:"center",gap:1}}>
                                <div style={{width:1.5,height:10,background:"rgba(255,255,255,0.5)",borderRadius:1}}/>
                                <div style={{width:1.5,height:10,background:"rgba(255,255,255,0.5)",borderRadius:1}}/>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── TRELLO IMPORT SCREEN ────────────────────────────────────
function TrelloImport({ onImport }) {
  const [dragging, setDragging] = useState(false);
  const [error, setError] = useState(null);
  const fileRef = useRef(null);

  const process = file => {
    setError(null);
    if (!file || !file.name.endsWith(".json")) {
      setError("Por favor selecione um arquivo .json exportado do Trello.");
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        const items = parseTrelloJSON(parsed);
        if (!items.length) { setError("Nenhum card encontrado. Verifique se é um export válido do Trello."); return; }
        onImport(items, parsed.name || "Board Trello");
      } catch (err) {
        setError("Arquivo JSON inválido. Exporte novamente pelo Trello.");
      }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 100px)",padding:24}}>
      <div style={{maxWidth:480,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,borderRadius:14,background:"#3b82f6",color:"#fff",
            fontWeight:800,fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>H</div>
          <h1 style={{fontSize:22,fontWeight:800,color:"#1e293b",marginBottom:8}}>Hospp Roadmap Agent</h1>
          <p style={{fontSize:13,color:"#64748b",lineHeight:1.6}}>
            Importe o arquivo JSON do seu board Trello<br/>para começar a montar o roadmap.
          </p>
        </div>

        <div
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); process(e.dataTransfer.files[0]); }}
          onClick={() => fileRef.current?.click()}
          style={{border:`2px dashed ${dragging ? "#3b82f6" : "#e2e8f0"}`,borderRadius:14,
            padding:"40px 24px",textAlign:"center",cursor:"pointer",
            background: dragging ? "#eff6ff" : "#f8fafc",transition:"all .15s"}}>
          <div style={{fontSize:36,marginBottom:12}}>📁</div>
          <div style={{fontWeight:700,fontSize:14,color:"#1e293b",marginBottom:4}}>
            {dragging ? "Solte o arquivo aqui" : "Arraste o arquivo JSON"}
          </div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>ou clique para selecionar</div>
          <button className="btn btn-primary" onClick={e => { e.stopPropagation(); fileRef.current?.click(); }}>
            Selecionar arquivo .json
          </button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}}
            onChange={e => process(e.target.files[0])}/>
        </div>

        {error && (
          <div style={{marginTop:12,padding:"10px 14px",background:"#fef2f2",border:"1px solid #fecaca",
            borderRadius:8,fontSize:12,color:"#dc2626"}}>{error}</div>
        )}

        <div style={{marginTop:20,padding:"14px 18px",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#92400e",marginBottom:6}}>Como exportar do Trello:</div>
          <ol style={{fontSize:11,color:"#78350f",lineHeight:1.8,paddingLeft:16}}>
            <li>Abra o seu board no Trello</li>
            <li>Clique em <strong>Menu (···)</strong> → <strong>Mais</strong></li>
            <li>Clique em <strong>Imprimir e Exportar</strong></li>
            <li>Clique em <strong>Exportar como JSON</strong></li>
            <li>Salve o arquivo e importe aqui</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  // State — persisted in localStorage
  const [frentes,     setFrentesRaw]  = useState(() => LS.get("hospp:frentes", FRENTES_INIT));
  const [trelloItems, setTrelloItems] = useState(() => LS.get("hospp:trello",  []));
  const [manualItems, setManualItems] = useState(() => LS.get("hospp:manual",  []));
  const [overlay,     setOverlayRaw]  = useState(() => LS.get("hospp:overlay", {}));
  const [boardName,   setBoardName]   = useState(() => LS.get("hospp:boardName", null));

  const [tab,          setTab]         = useState("frentes");
  const [showDeps,     setShowDeps]    = useState(true);
  const [hov,          setHov]         = useState(null);
  const [editing,      setEditing]     = useState(null);
  const [drill,        setDrill]       = useState(null);
  const [dragOver,     setDragOver]    = useState(null);
  const [filterGrupo,  setFilterGrupo] = useState(0);
  const [activeFrente, setActiveFrente]= useState(null);
  const [filterSrc,    setFilterSrc]   = useState("all");

  const refs   = useRef({});
  const dragId = useRef(null);

  // Persist helpers
  const setFreentes = v => { setFrentesRaw(v); LS.set("hospp:frentes", v); };
  const setOverlay  = v => { setOverlayRaw(v); LS.set("hospp:overlay", v); };

  // Merge trello + manual + overlay
  const allItems = useMemo(() => {
    const base = [...trelloItems, ...manualItems];
    return base.map(item => {
      const ov = overlay[item.id];
      if (!ov) return item;
      // Source fields (title, desc) stay from source; roadmap fields from overlay
      const { title: _t, description: _d, source: _s, ...roadmapPatch } = ov;
      return { ...item, ...roadmapPatch };
    });
  }, [trelloItems, manualItems, overlay]);

  const patchItem = useCallback((id, patch) => {
    // Optimistic UI
    setTrelloItems(p => p.map(i => i.id === id ? { ...i, ...patch } : i));
    setManualItems(p => p.map(i => i.id === id ? { ...i, ...patch } : i));
    // Persist in overlay
    setOverlay({ ...overlay, [id]: { ...(overlay[id] || {}), ...patch } });
  }, [overlay]);

  const onTrelloImport = (items, name) => {
    // Merge new items with existing overlay
    const merged = items.map(item => {
      const ov = overlay[item.id];
      if (!ov) return item;
      const { title: _t, description: _d, source: _s, ...roadmapPatch } = ov;
      return { ...item, ...roadmapPatch };
    });
    setTrelloItems(merged);
    LS.set("hospp:trello", merged);
    setBoardName(name);
    LS.set("hospp:boardName", name);
    setTab("frentes");
  };

  const saveFrente = form => {
    let updated;
    if (form.id && frentes.find(f => f.id === form.id)) {
      updated = frentes.map(f => f.id === form.id ? form : f);
    } else {
      const mx = Math.max(...frentes.map(f => f.num), 0);
      updated = [...frentes, { ...form, id: `m${Date.now()}`, num: mx + 1 }];
    }
    setFreentes(updated);
  };

  const openRoadmap = f => { setActiveFrente(f); setTab("roadmap"); setDrill(null); };

  const visFrente = filterGrupo === 0 ? frentes : frentes.filter(f => f.grupo === filterGrupo);
  const shownGrupos = filterGrupo === 0 ? GRUPOS : GRUPOS.filter(g => g.id === filterGrupo);

  const roadmapItems = useMemo(() => {
    let items = allItems;
    if (activeFrente) return items.filter(i =>
      i.group === activeFrente.titulo || i.listName === activeFrente.titulo);
    if (filterSrc !== "all") items = items.filter(i => i.source === filterSrc);
    return items;
  }, [allItems, activeFrente, filterSrc]);

  const hasData = trelloItems.length > 0 || manualItems.length > 0;

  const dragH = f => ({
    onDragStart: e => { dragId.current = f.id; e.dataTransfer.effectAllowed = "move"; },
    onDragEnd:   () => { dragId.current = null; setDragOver(null); },
  });

  // Show import screen if no data yet
  if (!hasData) {
    return (
      <div>
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",height:52,
          display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:26,height:26,borderRadius:7,background:"#3b82f6",color:"#fff",fontWeight:800,
            fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>H</div>
          <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>Hospp Roadmap Agent</span>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:"#eff6ff",color:"#3b82f6",fontWeight:700}}>Fase 1</span>
        </div>
        <TrelloImport onImport={onTrelloImport}/>
      </div>
    );

    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#f8fafc",minHeight:"100vh"}}>

        display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>

            fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>H</div>
          <span style={{fontWeight:800,fontSize:14,color:"#1e293b",whiteSpace:"nowrap"}}>Hospp</span>
          <span style={{color:"#cbd5e1"}}>/</span>
          <span style={{fontSize:12,color:"#64748b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:160}}>
            {boardName || "Roadmap Agent"}
          </span>
          {tab === "roadmap" && activeFrente && <>
            <span style={{color:"#cbd5e1"}}>/</span>
            <span style={{fontWeight:600,fontSize:11,color:"#3b82f6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:160}}>
              #{activeFrente.num} {activeFrente.titulo}
            </span>
            <button onClick={() => setActiveFrente(null)}
              style={{fontSize:10,padding:"2px 7px",borderRadius:20,border:"1px solid #e2e8f0",background:"#fff",
                color:"#94a3b8",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>× limpar</button>
          </>}

              {showDeps ? "Ocultar setas" : "Mostrar setas"}

            <button className="btn btn-primary" onClick={() => setEditing({})}>+ Nova Frente</button>
          </>}
          <button className="btn btn-ghost" onClick={() => {
            if (confirm("Importar novo JSON? Os cards atuais serão substituídos (edições de roadmap são mantidas).")) {
              setTrelloItems([]); LS.set("hospp:trello", []);

                  border:`1.5px solid ${filterGrupo===g.id?g.cor:"#e2e8f0"}`,
                  background:filterGrupo===g.id?g.cor:"#fff",color:filterGrupo===g.id?"#fff":"#64748b"}}>
                G{g.id} ({frentes.filter(f=>f.grupo===g.id).length})
              </button>
            ))}
          </div>

          {/* Board */}
          <div className="fb-scroll" style={{overflowX:"auto",overflowY:"auto",position:"relative",maxHeight:"calc(100vh - 185px)"}}>
            <Arrows frentes={visFrente} refs={refs} show={showDeps} hov={hov}/>
            <div style={{display:"flex",gap:14,alignItems:"flex-start",minWidth:shownGrupos.length*280,paddingBottom:8}}>
              {shownGrupos.map(g => {
                const gf = visFrente.filter(f => f.grupo === g.id);
                const over = dragOver === g.id;
                return (
                  <div key={g.id}
                    onDragOver={e => { e.preventDefault(); setDragOver(g.id); }}
                    onDragLeave={() => setDragOver(null)}
                    onDrop={e => {
                      e.preventDefault();
                      if (dragId.current) setFreentes(frentes.map(f => f.id===dragId.current ? {...f, grupo:g.id} : f));
                      setDragOver(null);
                    }}
                    style={{flex:filterGrupo!==0?"1":"0 0 272px",minWidth:272,
                      background:over?g.soft:"#f8fafc",
                      border:`2px solid ${over?g.cor:g.border}`,
                      borderRadius:12,overflow:"hidden",transition:"all .15s"}}>
                    <div style={{padding:"9px 11px 7px",background:g.soft,borderBottom:`1px solid ${g.border}`,
                      display:"flex",alignItems:"center",gap:7}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:g.cor,flexShrink:0}}/>
                      <span style={{fontSize:10.5,fontWeight:800,color:g.cor,flex:1,lineHeight:1.3}}>G{g.id} — {g.nome}</span>
                      <span style={{fontSize:9.5,padding:"1px 6px",borderRadius:20,
                        background:`${g.cor}22`,color:g.cor,fontWeight:700}}>{gf.length}</span>
                    </div>
                    <div style={{padding:"7px 7px",display:"flex",flexDirection:"column",gap:6}}>
                      {gf.map(f => (
                        <FCard key={f.id} f={f} g={g} all={frentes} refs={refs}
                          hov={hov} setHov={setHov}
                          onEdit={setEditing}
                          onDel={id => { if (confirm("Remover esta frente?")) setFreentes(frentes.filter(f => f.id !== id)); }}
                          onDrill={setDrill}
                          dragH={dragH}/>
                      ))}
                      {gf.length === 0 && (
                        <div style={{padding:"18px 0",textAlign:"center",color:"#cbd5e1",fontSize:11}}>
                          {over ? "Soltar aqui" : "Arraste frentes aqui"}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── ROADMAP TAB ── */}
      {tab === "roadmap" && (
        <div style={{padding:20}}>
          {/* Filters */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {[["all","Todos"], ["trello","Trello"], ["manual","Manual"]].map(([v, l]) => (
              <button key={v} onClick={() => { setFilterSrc(v); setActiveFrente(null); }}
                style={{padding:"4px 12px",borderRadius:20,fontSize:10.5,fontWeight:700,cursor:"pointer",
                  border:`1.5px solid ${filterSrc===v&&!activeFrente?"#3b82f6":"#e2e8f0"}`,
                  background:filterSrc===v&&!activeFrente?"#3b82f6":"#fff",
                  color:filterSrc===v&&!activeFrente?"#fff":"#64748b"}}>
                {l} ({v==="all"?allItems.length:allItems.filter(i=>i.source===v).length})
              </button>
            ))}
            <span style={{fontSize:10,color:"#94a3b8",marginLeft:4}}>
              Arrastar barra = mover | Puxar extremidade = redimensionar | Clicar prioridade = editar
            </span>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
            {[
              ["Total",  allItems.length,                              "#1e293b"],
              ["Trello", allItems.filter(i=>i.source==="trello").length, "#3b82f6"],
              ["Manual", allItems.filter(i=>i.source==="manual").length, "#8b5cf6"],
              ["Grupos", [...new Set(allItems.map(i=>i.group))].length,  "#f59e0b"],
            ].map(([l, v, c]) => (
              <div key={l} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 16px"}}>
                <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:10.5,color:"#94a3b8",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>

          <RoadmapBoard items={roadmapItems} onPatch={patchItem}/>
        </div>
      )}

      {/* ── MODALS ── */}
      {editing !== null && (
        <EditModal f={editing} all={frentes} onSave={saveFrente} onClose={() => setEditing(null)}/>
      )}
      {drill && (
        <DrillPanel f={drill} all={frentes} onClose={() => setDrill(null)} onOpenRoadmap={openRoadmap}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
