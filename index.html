}

const STATUS_MONTHS = {
  'Validar no Publicado': {s:0, d:1},
  'Para publicar':        {s:0, d:1},
  'Em andamento':         {s:0, d:2},
  'Em teste':             {s:0, d:2},
  'Aprovado':             {s:1, d:2},

  'Pendente':             {s:3, d:3},
  'Backlog':              {s:4, d:4},
  'StandBy':              {s:3, d:3},
  'Outros':               {s:1, d:2},
};

function calcMonths(status, durDias){
  const base = STATUS_MONTHS[status] || {s:1, d:2};
  const start = Math.min(12, CURRENT_MONTH + base.s);
  if(durDias && durDias > 0){
    const months = Math.max(1, Math.ceil(durDias / 22)); // ~22 dias úteis/mês
    const end = Math.min(12, start + months - 1);
    return {startMonth: start, endMonth: end, semEstimativa: false};
  }
  const end = Math.min(12, start + base.d - 1);
  return {startMonth: start, endMonth: end, semEstimativa: true};
}

function parseTrello(json){
  const board=typeof json==='string'?JSON.parse(json):json;
  const lists={};
  (board.lists||[]).forEach(l=>{lists[l.id]=l.name;});

  // Map custom field ids
  const cfFields={};
  (board.customFields||[]).forEach(cf=>{
    if(cf.name==='Duração (dias)') cfFields.dias=cf.id;
    if(cf.name==='Duração (horas)') cfFields.horas=cf.id;
  });

  return (board.cards||[]).filter(c=>!c.closed).map(c=>{
    const labels=(c.labels||[]).map(l=>l.name||'');
    const listName=lists[c.idList]||'';
    const status=PIPELINE_MAP[listName]||'Outros';
    let feature='Outros';
    for(const lbl of labels){if(FTR_MAP[lbl]){feature=FTR_MAP[lbl];break;}}
    if(feature==='Outros'&&labels.some(l=>l.includes('Bug')))feature='Bugs';
    const isPriority=labels.includes('PRIORIDADE')||labels.includes('[PRI] Demanda de Cliente');
    const isRedor=labels.includes("[PRI] Integrações Rede D'Or");

    // Extract duration from custom fields
    let durDias=null;
    (c.customFieldItems||[]).forEach(cfi=>{
      if(cfi.idCustomField===cfFields.dias && cfi.value?.number)
        durDias=parseFloat(cfi.value.number);
      if(!durDias && cfi.idCustomField===cfFields.horas && cfi.value?.number)
        durDias=parseFloat(cfi.value.number)/8; // 8h = 1 dia
    });

    const {startMonth,endMonth,semEstimativa}=calcMonths(status,durDias);

    return {
      id:'t-'+c.id, source:'trello', title:c.name, feature, status,
      active:ACTIVE_STATUSES.has(status), url:c.shortUrl||'',
      priority:isPriority?'high':'medium', isRedor,
      startMonth, endMonth, semEstimativa,
      durDias, group:feature, listName,
    };
  });
}

// ─── ARROW LAYER ─────────────────────────────────────────────
function Arrows({frentes,refs,show,hov}){
  const [paths,setPaths]=useState([]);
  const compute=useCallback(()=>{
    if(!show){setPaths([]);return;}
    const cont=document.querySelector('.fb-scroll');
    if(!cont)return;
    const cr=cont.getBoundingClientRect(),sl=cont.scrollLeft,st=cont.scrollTop;
    const res=[];
    frentes.forEach(f=>f.dependeDe.forEach(dep=>{
      const a=refs.current[dep],b=refs.current[f.id];
      if(!a||!b)return;
      const ar=a.getBoundingClientRect(),br=b.getBoundingClientRect();
      res.push({fid:dep,tid:f.id,x1:ar.right-cr.left+sl,y1:ar.top+ar.height/2-cr.top+st,x2:br.left-cr.left+sl,y2:br.top+br.height/2-cr.top+st});
    }));
    setPaths(res);
  },[frentes,show,refs]);
  useEffect(()=>{const t=setTimeout(compute,80);window.addEventListener('resize',compute);return()=>{clearTimeout(t);window.removeEventListener('resize',compute);};},[compute]);
  if(!show||!paths.length)return null;
  return(<svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:10,overflow:'visible'}}>
    <defs>{[['n','#94a3b8'],['f','#3b82f6'],['t','#f59e0b']].map(([k,c])=>(
      <marker key={k} id={`m${k}`} markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill={c}/></marker>
    ))}</defs>
    {paths.map((p,i)=>{
      const hf=hov===p.fid,ht=hov===p.tid,hi=hf||ht,dx=Math.abs(p.x2-p.x1)*0.4;
      return<path key={i} d={`M${p.x1},${p.y1} C${p.x1+dx},${p.y1} ${p.x2-dx},${p.y2} ${p.x2},${p.y2}`}
        fill="none" stroke={hf?'#3b82f6':ht?'#f59e0b':'#cbd5e1'} strokeWidth={hi?2:1}
        strokeDasharray={hi?'none':'4 3'} markerEnd={hf?'url(#mf)':ht?'url(#mt)':'url(#mn)'} opacity={hi?1:0.45}
        style={{transition:'stroke .15s,opacity .15s'}}/>;
    })}
  </svg>);
}

// ─── ROADMAP BOARD ───────────────────────────────────────────
const COL_W=72, LABEL_W=280;

function RoadmapBoard({items,onPatch,onCardClick,onMoveCard}){
  const [dragOverGroup,setDragOverGroup]=useState(null);
  const [editCell,setEditCell]=useState(null);
  const [editVal,setEditVal]=useState('');
  const dragId=useRef(null);
  const mouseRef=useRef(null);

  // Group by feature area in defined order
  const grouped=useMemo(()=>{
    const map={};
    items.forEach(item=>{
      const g=item.feature||item.group||'Outros';
      if(!map[g])map[g]=[];
      map[g].push(item);
    });
    const ordered=[];
    FEATURE_ORDER.forEach(f=>{if(map[f])ordered.push([f,map[f]]);});
    Object.keys(map).forEach(f=>{if(!FEATURE_ORDER.includes(f))ordered.push([f,map[f]]);});
    return ordered;
  },[items]);

  const startDrag=(e,item,type)=>{
    e.preventDefault();e.stopPropagation();
    const sx=e.clientX,os=item.startMonth,oe=item.endMonth;
    mouseRef.current={id:item.id,type,sx,os,oe};
    const mv=ev=>{
      if(!mouseRef.current)return;
      const {id,type:t,sx,os,oe}=mouseRef.current;
      const delta=Math.round((ev.clientX-sx)/COL_W);
      if(t==='move'){const ns=Math.max(1,Math.min(12,os+delta));onPatch(id,{startMonth:ns,endMonth:Math.min(12,ns+(oe-os))});}
      else{onPatch(id,{endMonth:Math.max(os,Math.min(12,oe+delta))});}
    };
    const up=()=>{mouseRef.current=null;window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  };

  if(!items.length)return(
    <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'60px 20px',textAlign:'center'}}>
      <div style={{fontSize:36,marginBottom:12}}>📋</div>
      <div style={{fontWeight:700,fontSize:15,color:'#64748b',marginBottom:6}}>Nenhum card para mostrar</div>
      <div style={{fontSize:13,color:'#94a3b8'}}>Ajuste os filtros ou importe o JSON do Trello</div>
    </div>);

  return(<div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'auto',maxHeight:'calc(100vh - 280px)'}}>
    <div style={{minWidth:LABEL_W+COL_W*12}}>
      {/* Month header */}
      <div style={{display:'grid',gridTemplateColumns:`${LABEL_W}px repeat(12,${COL_W}px)`,background:'#f8fafc',borderBottom:'2px solid #e2e8f0',position:'sticky',top:0,zIndex:5}}>
        <div style={{padding:'8px 14px',fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',borderRight:'1px solid #e2e8f0'}}>Iniciativa — {CURRENT_YEAR}</div>
        {MONTHS.map((m,i)=>(
          <div key={m} style={{padding:'8px 4px',textAlign:'center',fontSize:10,fontWeight:700,borderRight:'1px solid #e2e8f0',color:i+1===CURRENT_MONTH?'#3b82f6':'#94a3b8',background:i+1===CURRENT_MONTH?'#eff6ff':undefined}}>
            {m}{i+1===CURRENT_MONTH&&<div style={{width:4,height:4,background:'#3b82f6',borderRadius:'50%',margin:'2px auto 0'}}/>}
          </div>))}
      </div>

      {/* Feature area groups */}
      {grouped.map(([feature,groupItems])=>{
        const fc=FEATURE_COLORS[feature]||FEATURE_COLORS['Outros'];
        const isOver=dragOverGroup===feature;
        // Status summary
        const statusCount={};
        groupItems.forEach(i=>{statusCount[i.status]=(statusCount[i.status]||0)+1;});
        const topStatuses=Object.entries(statusCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

        return(<div key={feature}
          onDragOver={e=>{e.preventDefault();setDragOverGroup(feature);}}
          onDragLeave={()=>setDragOverGroup(null)}
          onDrop={e=>{e.preventDefault();if(dragId.current)onPatch(dragId.current,{feature,group:feature});setDragOverGroup(null);}}>

          {/* Group header */}
          <div style={{display:'grid',gridTemplateColumns:`${LABEL_W}px repeat(12,${COL_W}px)`,background:isOver?fc.soft:'#f8fafc',borderBottom:'1px solid #e2e8f0',minHeight:38,transition:'background .15s'}}>
            <div style={{padding:'7px 14px',display:'flex',alignItems:'center',gap:8,borderRight:'1px solid #e2e8f0'}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:fc.bar,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:800,color:fc.text}}>{feature}</span>
              <span style={{fontSize:9.5,padding:'1px 6px',borderRadius:20,background:`${fc.bar}18`,color:fc.text,fontWeight:700}}>{groupItems.length}</span>
              <div style={{display:'flex',gap:4,marginLeft:4,flexWrap:'wrap'}}>
                {topStatuses.map(([s,n])=>{const ss=STATUS_STYLE[s]||STATUS_STYLE['Pendente'];return(
                  <span key={s} style={{fontSize:8.5,padding:'1px 5px',borderRadius:20,background:ss.bg,color:ss.text,fontWeight:600,whiteSpace:'nowrap'}}>{s} ({n})</span>);})}
              </div>
              {isOver&&<span style={{fontSize:9,color:fc.text,fontWeight:600,marginLeft:'auto'}}>↓ soltar</span>}
            </div>
            {MONTHS.map((_,i)=><div key={i} style={{borderRight:'1px solid #e2e8f0',background:i+1===CURRENT_MONTH?`${fc.bar}08`:undefined}}/>)}
          </div>

          {/* Item rows */}
          {groupItems.map(item=>{
            const ss=STATUS_STYLE[item.status]||STATUS_STYLE['Pendente'];
            return(<div key={item.id}
              draggable
              onDragStart={()=>dragId.current=item.id}
              onDragEnd={()=>{dragId.current=null;setDragOverGroup(null);}}
              style={{display:'grid',gridTemplateColumns:`${LABEL_W}px repeat(12,${COL_W}px)`,borderBottom:'1px solid #f1f5f9',minHeight:50,background:'#fff',transition:'background .1s',cursor:'grab'}}
              onMouseEnter={e=>e.currentTarget.style.background='#f8fbff'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}>

              {/* Label */}

// ─── MACRO VIEW ──────────────────────────────────────────────
function MacroView({items,frentes,onDrillDown}){
  const rows=useMemo(()=>frentes.map(f=>{
    const fc=items.filter(i=>getFrenteTitulo(i)===f.titulo);
    if(!fc.length)return null;
    const s=Math.min(...fc.map(c=>c.startMonth||CURRENT_MONTH));
    const e=Math.max(...fc.map(c=>c.endMonth||Math.min(12,CURRENT_MONTH+1)));
    const sc={};fc.forEach(c=>{sc[c.status]=(sc[c.status]||0)+1;});
    return{...f,fc,s,e,sc};
  }).filter(Boolean),[items,frentes]);

  const COL=80,LBL=300;
  return(<div style={{overflowX:'auto',maxHeight:'calc(100vh - 300px)'}}>
    <div style={{minWidth:LBL+COL*12}}>
      <div style={{display:'grid',gridTemplateColumns:`${LBL}px repeat(12,${COL}px)`,background:'#f8fafc',borderBottom:'2px solid #e2e8f0',position:'sticky',top:0,zIndex:5}}>
        <div style={{padding:'10px 16px',fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',borderRight:'1px solid #e2e8f0',letterSpacing:'.05em'}}>Frente de Ação — {CURRENT_YEAR}</div>
        {MONTHS.map((m,i)=><div key={m} style={{padding:'10px 4px',textAlign:'center',fontSize:10,fontWeight:700,borderRight:'1px solid #e2e8f0',color:i+1===CURRENT_MONTH?'#3b82f6':'#94a3b8',background:i+1===CURRENT_MONTH?'#eff6ff':undefined}}>
          {m}{i+1===CURRENT_MONTH&&<div style={{width:4,height:4,background:'#3b82f6',borderRadius:'50%',margin:'2px auto 0'}}/>}
        </div>)}
      </div>
      {rows.map(f=>(
        <div key={f.id} onClick={()=>onDrillDown(f)}
          title='Clique para ver os cards desta frente no roadmap detalhado' style={{display:'grid',gridTemplateColumns:`${LBL}px repeat(12,${COL}px)`,borderBottom:'1px solid #f1f5f9',minHeight:60,cursor:'pointer',background:'#fff',transition:'background .1s'}}
          onMouseEnter={e=>e.currentTarget.style.background=`${f.cor}06`}
          onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
          <div style={{padding:'10px 16px',borderRight:'1px solid #e2e8f0',display:'flex',flexDirection:'column',justifyContent:'center',gap:5}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:24,height:24,borderRadius:6,background:f.cor,color:'#fff',fontWeight:800,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{f.num}</span>
              <span style={{fontSize:13,fontWeight:700,color:'#1e293b'}}>{f.titulo}</span>
            </div>
            <div style={{display:'flex',gap:5,alignItems:'center',paddingLeft:32,flexWrap:'wrap'}}>
              {Object.entries(f.sc).slice(0,2).map(([s,n])=>{
                const ss=STATUS_STYLE[s]||STATUS_STYLE['Pendente'];
                return<span key={s} title={STATUS_TOOLTIP[s]||s} style={{fontSize:9,padding:'1px 6px',borderRadius:20,background:ss.bg,color:ss.text,fontWeight:600,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:3,cursor:'help'}}>
                  <span style={{width:4,height:4,borderRadius:'50%',background:ss.dot,display:'inline-block'}}/>{s} ({n})</span>;
              })}
              <span style={{fontSize:9,color:'#94a3b8'}}>{f.fc.length} cards →</span>
            </div>
          </div>
          {MONTHS.map((_,mi)=>{
            const mo=mi+1,active=mo>=f.s&&mo<=f.e,isS=mo===f.s,isE=mo===f.e;
            return<div key={mi} style={{borderRight:'1px solid #f1f5f9',display:'flex',alignItems:'center',padding:'0 3px',background:mi+1===CURRENT_MONTH?`${f.cor}06`:undefined}}>
              {active&&<div style={{height:32,width:'100%',background:f.cor,opacity:0.88,position:'relative',
                borderRadius:`${isS?'8px':'0'} ${isE?'8px':'0'} ${isE?'8px':'0'} ${isS?'8px':'0'}`,
                marginLeft:isS?3:0,marginRight:isE?3:0,boxShadow:`0 2px 8px ${f.cor}40`}}>
                {isS&&<span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:9,fontWeight:700,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',pointerEvents:'none'}}>
                  {f.e>f.s?`${MONTHS[f.s-1]}–${MONTHS[f.e-1]}`:MONTHS[f.s-1]}
                </span>}
              </div>}
            </div>;
          })}
        </div>
      ))}
      {rows.length===0&&<div style={{textAlign:'center',padding:'48px 0',color:'#94a3b8',fontSize:13}}>
        Nenhuma frente com cards. Importe o JSON do Trello primeiro.

  </div>);
}

// ─── MODULOS TIMELINE ────────────────────────────────────────
function ModulosTimeline({items, modulos, onDrillDown}){
  const COL=72, LBL=260;
  const rows = useMemo(()=>modulos.map(m=>{
    const mc = items.filter(i=>i.active && getModuloId(i)===m.id);
    if(!mc.length) return {...m, mc:[], s:0, e:0, sc:{}, empty:true};
    const s = Math.min(...mc.map(i=>i.startMonth||CURRENT_MONTH));
    const e = Math.max(...mc.map(i=>i.endMonth||CURRENT_MONTH));
    const sc={};
    mc.forEach(i=>{sc[i.status]=(sc[i.status]||0)+1;});
    // Segmented counts for progress
    const done   = (sc['Validar no Publicado']||0)+(sc['Para publicar']||0);
    const doing  = (sc['Em andamento']||0)+(sc['Em teste']||0)+(sc['Aprovado']||0);
    const todo   = mc.length - done - doing;
    return {...m, mc, s, e, sc, done, doing, todo, empty:false};
  }),[items,modulos]);

  return(
    <div style={{overflowX:'auto',maxHeight:'calc(100vh - 280px)'}}>
      <div style={{minWidth:LBL+COL*12}}>
        {/* Header */}
        <div style={{display:'grid',gridTemplateColumns:`${LBL}px repeat(12,${COL}px)`,
          background:'#f8fafc',borderBottom:'2px solid #e2e8f0',position:'sticky',top:0,zIndex:5}}>
          <div style={{padding:'10px 16px',fontSize:10,fontWeight:700,color:'#94a3b8',
            textTransform:'uppercase',borderRight:'1px solid #e2e8f0',letterSpacing:'.05em'}}>
            Módulo — {new Date().getFullYear()}
          </div>
          {MONTHS.map((m,i)=>(
            <div key={m} style={{padding:'10px 4px',textAlign:'center',fontSize:10,fontWeight:700,
              borderRight:'1px solid #e2e8f0',
              color:i+1===CURRENT_MONTH?'#3b82f6':'#94a3b8',
              background:i+1===CURRENT_MONTH?'#eff6ff':undefined}}>
              {m}{i+1===CURRENT_MONTH&&<div style={{width:4,height:4,background:'#3b82f6',borderRadius:'50%',margin:'2px auto 0'}}/>}
            </div>
          ))}
        </div>

        {/* Rows */}
        {rows.map(m=>(
          <div key={m.id} onClick={()=>!m.empty&&onDrillDown(m)}
            style={{display:'grid',gridTemplateColumns:`${LBL}px repeat(12,${COL}px)`,
              borderBottom:'1px solid #f1f5f9',minHeight:58,
              cursor:m.empty?'default':'pointer',background:'#fff',transition:'background .1s'}}
            onMouseEnter={e=>{if(!m.empty)e.currentTarget.style.background=`${m.cor}06`;}}
            onMouseLeave={e=>e.currentTarget.style.background='#fff'}>

            {/* Label */}
            <div style={{padding:'8px 14px',borderRight:'1px solid #e2e8f0',
              display:'flex',flexDirection:'column',justifyContent:'center',gap:5}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:22,height:22,borderRadius:6,background:m.cor,color:'#fff',
                  fontWeight:800,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{m.num}</span>
                <span style={{fontSize:12,fontWeight:700,color:'#1e293b'}}>{m.titulo}</span>
              </div>
              {!m.empty?(
                <div style={{paddingLeft:30}}>
                  {/* Segmented progress bar */}
                  <div style={{display:'flex',height:5,borderRadius:3,overflow:'hidden',gap:1,marginBottom:3}}>
                    {m.done>0&&<div style={{flex:m.done,background:'#22c55e',borderRadius:'3px 0 0 3px'}} title={`${m.done} validando/publicando`}/>}
                    {m.doing>0&&<div style={{flex:m.doing,background:'#3b82f6'}} title={`${m.doing} em andamento`}/>}
                    {m.todo>0&&<div style={{flex:m.todo,background:'#e2e8f0',borderRadius:'0 3px 3px 0'}} title={`${m.todo} pendente`}/>}
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {m.done>0&&<span style={{fontSize:8.5,color:'#16a34a',fontWeight:600}}>{m.done} publicando</span>}
                    {m.doing>0&&<span style={{fontSize:8.5,color:'#2563eb',fontWeight:600}}>{m.doing} em andamento</span>}
                    {m.todo>0&&<span style={{fontSize:8.5,color:'#94a3b8'}}>{m.todo} pendente</span>}
                  </div>
                </div>
              ):(
                <span style={{fontSize:10,color:'#f59e0b',paddingLeft:30,fontWeight:600}}>Sem cards ativos</span>
              )}
            </div>

            {/* Timeline cells */}
            {MONTHS.map((_,mi)=>{
              const mo=mi+1;
              const active = !m.empty && mo>=m.s && mo<=m.e;
              const isS = mo===m.s, isE = mo===m.e;
              return(
                <div key={mi} style={{borderRight:'1px solid #f1f5f9',display:'flex',alignItems:'center',padding:'0 3px',
                  background:mi+1===CURRENT_MONTH?`${m.cor}06`:undefined}}>
                  {active&&(
                    <div title={`${m.titulo}: ${MONTHS[m.s-1]}–${MONTHS[m.e-1]} • ${m.mc.length} cards ativos`}
                      style={{height:32,width:'100%',background:m.cor,opacity:0.85,position:'relative',
                        borderRadius:`${isS?'8px':'0'} ${isE?'8px':'0'} ${isE?'8px':'0'} ${isS?'8px':'0'}`,
                        marginLeft:isS?3:0,marginRight:isE?3:0,
                        boxShadow:`0 2px 8px ${m.cor}40`}}>
                      {isS&&(
                        <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',
                          fontSize:9,fontWeight:700,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',pointerEvents:'none'}}>
                          {m.e>m.s?`${MONTHS[m.s-1]}–${MONTHS[m.e-1]}`:MONTHS[m.s-1]} • {m.mc.length} cards
                        </span>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

      {modulosWithStats.map(m=>(

        <div style={{fontSize:11,color:'#78350f',lineHeight:1.6}}>Acesse o Roadmap Detalhado e use o botão "↕ módulo" para classificá-los.</div>

    {/* TIMELINE VIEW */}
    {viewMode==='timeline'&&(
      <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>

    {editing!==null&&(
      <ModuloEditModal modulo={editing} onSave={form=>{

        else onAdd(form);
        setEditing(null);
      }} onClose={()=>setEditing(null)}/>

}

// ─── IMPORT SCREEN ───────────────────────────────────────────
function ImportScreen({onImport, onRestore}){
  const [drag,setDrag]=useState(false);
  const [err,setErr]=useState(null);
  const ref=useRef(null);
  const restoreRef=useRef(null);

  const process=file=>{
    setErr(null);
    if(!file||!file.name.endsWith('.json')){setErr('Selecione um arquivo .json exportado do Trello.');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const parsed=JSON.parse(e.target.result);
        // Check if it's a backup file
        if(parsed.version&&parsed.trelloItems){
          onRestore(parsed);
          return;
        }
        const items=parseTrello(parsed);
        if(!items.length){setErr('Nenhum card encontrado. Verifique se é um export válido do Trello.');return;}
        onImport(items,parsed.name||'Board Trello');
      }catch{setErr('Arquivo JSON inválido. Exporte novamente pelo Trello.');}
    };
    reader.readAsText(file);
  };

  const processRestore=file=>{
    setErr(null);
    if(!file||!file.name.endsWith('.json')){setErr('Selecione um arquivo .json de backup.');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const parsed=JSON.parse(e.target.result);
        if(!parsed.version||!parsed.trelloItems){setErr('Arquivo inválido. Selecione um backup gerado pelo botão Salvar.');return;}
        onRestore(parsed);
      }catch{setErr('Arquivo JSON inválido.');}
    };
    reader.readAsText(file);
  };

  return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 52px)',padding:24}}>
    <div style={{maxWidth:480,width:'100%'}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{width:56,height:56,borderRadius:14,background:'#3b82f6',color:'#fff',fontWeight:800,fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>H</div>
        <h1 style={{fontSize:22,fontWeight:800,color:'#1e293b',marginBottom:8}}>Hospp Roadmap Agent</h1>
        <p style={{fontSize:13,color:'#64748b',lineHeight:1.6}}>Importe o arquivo JSON do Trello ou restaure um backup salvo.</p>
      </div>

      {/* Opção 1 — JSON do Trello */}
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);}}
        onClick={()=>ref.current?.click()}
        style={{border:`2px dashed ${drag?'#3b82f6':'#e2e8f0'}`,borderRadius:14,padding:'32px 24px',textAlign:'center',cursor:'pointer',background:drag?'#eff6ff':'#f8fafc',transition:'all .15s',marginBottom:12}}>
        <div style={{fontSize:32,marginBottom:8}}>📁</div>
        <div style={{fontWeight:700,fontSize:14,color:'#1e293b',marginBottom:3}}>{drag?'Solte o arquivo aqui':'Importar JSON do Trello'}</div>
        <div style={{fontSize:12,color:'#94a3b8',marginBottom:14}}>Arraste ou clique para selecionar o export do Trello</div>
        <button onClick={e=>{e.stopPropagation();ref.current?.click();}}
          style={{padding:'8px 18px',borderRadius:8,background:'#3b82f6',color:'#fff',fontWeight:700,fontSize:12,border:'none',cursor:'pointer'}}>
          Selecionar arquivo .json
        </button>
        <input ref={ref} type="file" accept=".json" style={{display:'none'}} onChange={e=>process(e.target.files[0])}/>
      </div>

      {/* Divisor */}
      <div style={{display:'flex',alignItems:'center',gap:12,margin:'16px 0'}}>
        <div style={{flex:1,height:1,background:'#e2e8f0'}}/>
        <span style={{fontSize:11,color:'#94a3b8',fontWeight:600}}>OU</span>
        <div style={{flex:1,height:1,background:'#e2e8f0'}}/>
      </div>

      {/* Opção 2 — Restaurar backup */}
      <div onClick={()=>restoreRef.current?.click()}
        style={{border:'2px dashed #e2e8f0',borderRadius:14,padding:'24px',textAlign:'center',cursor:'pointer',background:'#f8fafc',transition:'all .15s'}}
        onMouseEnter={e=>e.currentTarget.style.borderColor='#10b981'}
        onMouseLeave={e=>e.currentTarget.style.borderColor='#e2e8f0'}>
        <div style={{fontSize:28,marginBottom:8}}>📂</div>
        <div style={{fontWeight:700,fontSize:14,color:'#1e293b',marginBottom:3}}>Restaurar backup salvo</div>
        <div style={{fontSize:12,color:'#94a3b8',marginBottom:14}}>Carrega um arquivo <strong>hospp-backup-*.json</strong> com todo o estado anterior</div>
        <button onClick={e=>{e.stopPropagation();restoreRef.current?.click();}}
          style={{padding:'8px 18px',borderRadius:8,background:'#10b981',color:'#fff',fontWeight:700,fontSize:12,border:'none',cursor:'pointer'}}>
          📂 Restaurar backup
        </button>
        <input ref={restoreRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>processRestore(e.target.files[0])}/>
      </div>

      {err&&<div style={{marginTop:12,padding:'10px 14px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,fontSize:12,color:'#dc2626'}}>{err}</div>}

      <div style={{marginTop:20,padding:'14px 18px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:6}}>Como exportar do Trello:</div>
        <ol style={{fontSize:11,color:'#78350f',lineHeight:1.8,paddingLeft:16}}>
          <li>Abra o board no Trello</li>
          <li>Clique em <strong>··· (Menu)</strong> ao lado do nome do board</li>
          <li>Clique em <strong>Imprimir, exportar e compartilhar</strong></li>
          <li>Clique em <strong>Exportar como JSON</strong></li>
          <li>Na página que abrir, pressione <strong>Ctrl+S</strong> para salvar</li>
        </ol>
      </div>
    </div>
  </div>);
}

// ─── MAIN APP ────────────────────────────────────────────────
function App(){
  const [frentes,setFrentesRaw]  =useState(()=>LS.get('hospp:frentes',FRENTES_INIT));
  const [modulos,setModulosRaw]  =useState(()=>LS.get('hospp:modulos',MODULOS_INIT));
  const [trelloItems,setTrelloRaw]=useState(()=>LS.get('hospp:trello',[]));
  const [overlay,setOverlayRaw]  =useState(()=>LS.get('hospp:overlay',{}));
  const [boardName,setBoardName] =useState(()=>LS.get('hospp:boardName',null));

  const [tab,setTab]=useState('frentes');
  const [showDeps,setShowDeps]=useState(true);
  const [hov,setHov]=useState(null);
  const [editing,setEditing]=useState(null);
  const [drill,setDrill]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [filterGrupo,setFilterGrupo]=useState(0);
  const [activeFrente,setActiveFrente]=useState(null);
  const [activeModulo,setActiveModulo]=useState(null);
  const [filterStatus,setFilterStatus]=useState('active');
  const [filterFeature,setFilterFeature]=useState('all');
  const [selectedCard,setSelectedCard]=useState(null);
  const [roadmapView,setRoadmapView]=useState('macro');
  const [moveCardModal,setMoveCardModal]=useState(null);

  const refs=useRef({});
  const dragId=useRef(null);

  const setFreentes=v=>{setFrentesRaw(v);LS.set('hospp:frentes',v);};
  const setModulos=v=>{setModulosRaw(v);LS.set('hospp:modulos',v);};
  const setOverlay=v=>{setOverlayRaw(v);LS.set('hospp:overlay',v);};

  const patchItem=useCallback((id,patch)=>{
    setTrelloRaw(p=>{const u=p.map(i=>i.id===id?{...i,...patch}:i);LS.set('hospp:trello',u);return u;});
    setOverlay({...overlay,[id]:{...(overlay[id]||{}),...patch}});
  },[overlay]);

  const onImport=(items,name)=>{
    const merged=items.map(item=>{const ov=overlay[item.id];if(!ov)return item;const{title:_t,source:_s,...p}=ov;return{...item,...p};});
    setTrelloRaw(merged);LS.set('hospp:trello',merged);
    setBoardName(name);LS.set('hospp:boardName',name);
    setTab('frentes');
  };

  const saveFrente=form=>{
    let updated;
    if(form.id&&frentes.find(f=>f.id===form.id))updated=frentes.map(f=>f.id===form.id?form:f);
    else{const mx=Math.max(...frentes.map(f=>f.num),0);updated=[...frentes,{...form,id:`m${Date.now()}`,num:mx+1}];}
    setFreentes(updated);
  };

  const openRoadmap=f=>{setActiveFrente(f);setFilterFeature(f.titulo);setTab('roadmap');setRoadmapView('detail');setDrill(null);};

  const openRoadmapFromModulo=m=>{setActiveModulo(m);setActiveFrente(null);setFilterFeature('all');setTab('roadmap');setRoadmapView('detail');};

  const moveCardToModulo=(cardId,moduloId)=>{
    patchItem(cardId,{moduloId});
  };

  const saveState=()=>{
    const data={version:'3.7',savedAt:new Date().toISOString(),trelloItems,overlay,frentes,modulos,boardName};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`hospp-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  };

  const restoreFileRef=useRef(null);
  const restoreState=()=>restoreFileRef.current?.click();
  const onRestoreFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.trelloItems){setTrelloRaw(d.trelloItems);LS.set('hospp:trello',d.trelloItems);}
        if(d.overlay){setOverlay(d.overlay);}
        if(d.frentes){setFreentes(d.frentes);}
        if(d.modulos){setModulos(d.modulos);}
        if(d.boardName){setBoardName(d.boardName);LS.set('hospp:boardName',d.boardName);}
        alert('Estado restaurado com sucesso!');
      }catch{alert('Arquivo inválido.');}
    };
    reader.readAsText(file);
    e.target.value='';
  };

  const moveCardToFrente=(cardId,frenteTitulo)=>{
    patchItem(cardId,{frenteTitulo,feature:frenteTitulo,group:frenteTitulo});
  };

  const allItems=useMemo(()=>trelloItems.map(item=>{
    const ov=overlay[item.id];if(!ov)return item;
    const{title:_t,source:_s,...p}=ov;return{...item,...p};
  }),[trelloItems,overlay]);

  const roadmapItems=useMemo(()=>{
    let items=allItems;
    if(filterStatus==='active')items=items.filter(i=>i.active);
    else if(filterStatus==='validar')items=items.filter(i=>i.status==='Validar no Publicado');
    else if(filterStatus==='andamento')items=items.filter(i=>['Em andamento','Aprovado','Em teste'].includes(i.status));
    else if(filterStatus==='pendente')items=items.filter(i=>['Pendente','Aguardando Aprovação','Backlog'].includes(i.status));
    else if(filterStatus==='semest')items=items.filter(i=>i.active&&i.semEstimativa);
    else if(filterStatus!=='all')items=items.filter(i=>i.status===filterStatus);
    if(activeModulo)items=items.filter(i=>getModuloId(i)===activeModulo.id);
    else if(activeFrente)items=items.filter(i=>getFrenteTitulo(i)===activeFrente.titulo);
    else if(filterFeature!=='all')items=items.filter(i=>i.feature===filterFeature||i.group===filterFeature);
    return items;
  },[allItems,filterStatus,filterFeature,activeFrente,activeModulo]);

  const features=useMemo(()=>[...new Set(allItems.map(i=>i.feature||i.group||'Outros'))].sort(),[allItems]);
  const hasData=trelloItems.length>0;
  const visFrente=filterGrupo===0?frentes:frentes.filter(f=>f.grupo===filterGrupo);
  const shownGrupos=filterGrupo===0?GRUPOS:GRUPOS.filter(g=>g.id===filterGrupo);
  const dragH=f=>({onDragStart:e=>{dragId.current=f.id;e.dataTransfer.effectAllowed='move';},onDragEnd:()=>{dragId.current=null;setDragOver(null);}});

  const onRestoreFromImport=(data)=>{
    if(data.trelloItems){setTrelloRaw(data.trelloItems);LS.set('hospp:trello',data.trelloItems);}
    if(data.overlay){setOverlay(data.overlay);}
    if(data.frentes){setFreentes(data.frentes);}
    if(data.boardName){setBoardName(data.boardName);LS.set('hospp:boardName',data.boardName);}
  };

  if(!hasData) return(
    <div>
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'0 20px',height:52,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:26,height:26,borderRadius:7,background:'#3b82f6',color:'#fff',fontWeight:800,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center'}}>H</div>
        <span style={{fontWeight:800,fontSize:14,color:'#1e293b'}}>Hospp Roadmap Agent</span>
        <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:'#eff6ff',color:'#3b82f6',fontWeight:700}}>Fase 1</span>
      </div>
      <ImportScreen onImport={onImport} onRestore={onRestoreFromImport}/>
    </div>);

  return(<div style={{fontFamily:'system-ui,-apple-system,sans-serif',background:'#f1f5f9',minHeight:'100vh'}}>

    {/* TOP BAR */}
    <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'0 20px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:50}}>
      <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
        <div style={{width:26,height:26,borderRadius:7,background:'#3b82f6',color:'#fff',fontWeight:800,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>H</div>
        <span style={{fontWeight:800,fontSize:14,color:'#1e293b',whiteSpace:'nowrap'}}>Hospp</span>
        <span style={{color:'#cbd5e1'}}>/</span>
        <span style={{fontSize:12,color:'#64748b',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:180}}>{boardName||'Roadmap'}</span>
        {tab==='roadmap'&&activeFrente&&<>
          <span style={{color:'#cbd5e1'}}>/</span>
          <span style={{fontWeight:600,fontSize:11,color:'#3b82f6',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:160}}>#{activeFrente.num} {activeFrente.titulo}</span>
          <button title='Remover filtro de frente e ver todos os cards' onClick={()=>{setActiveFrente(null);setFilterFeature('all');}} style={{fontSize:10,padding:'2px 7px',borderRadius:20,border:'1px solid #e2e8f0',background:'#fff',color:'#94a3b8',cursor:'pointer',flexShrink:0}}>× limpar</button>
        </>}
      </div>
      <div style={{display:'flex',gap:6,flexShrink:0}}>
        {tab==='frentes'&&<>
          <button title={showDeps?'Ocultar setas de dependência entre frentes':'Mostrar setas de dependência entre frentes'} onClick={()=>setShowDeps(d=>!d)} style={{padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:700,cursor:'pointer',border:`1.5px solid ${showDeps?'#3b82f6':'#e2e8f0'}`,background:showDeps?'#eff6ff':'#fff',color:showDeps?'#1d4ed8':'#64748b'}}>
            {showDeps?'Ocultar setas':'Mostrar setas'}
          </button>
          <button title='Criar uma nova frente de ação' onClick={()=>setEditing({})} style={{padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:700,border:'none',background:'#3b82f6',color:'#fff',cursor:'pointer'}}>+ Nova Frente</button>
        </>}
        <button title='Baixar arquivo .json com todo o estado atual: cards, edições, frentes e posições' onClick={saveState} style={{padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:700,border:'1.5px solid #e2e8f0',background:'#fff',color:'#475569',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
          💾 Salvar
        </button>
        <button title='Carregar arquivo .json salvo anteriormente e restaurar todo o estado' onClick={restoreState} style={{padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:700,border:'1.5px solid #e2e8f0',background:'#fff',color:'#475569',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
          📂 Restaurar
        </button>
        <input ref={restoreFileRef} type="file" accept=".json" style={{display:'none'}} onChange={onRestoreFile}/>
        <button title='Importar novo arquivo JSON do Trello — substitui cards mas mantém edições' onClick={()=>{if(confirm('Importar novo JSON? Cards atuais serão substituídos (edições mantidas).')){{setTrelloRaw([]);LS.set('hospp:trello',[]);}}}} style={{padding:'5px 12px',borderRadius:7,fontSize:11,fontWeight:700,border:'1.5px solid #e2e8f0',background:'#fff',color:'#64748b',cursor:'pointer'}}>
          Novo JSON
        </button>
      </div>
    </div>

    {/* TABS */}
    <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'0 20px',display:'flex',gap:0}}>
      {[['frentes',`Frentes (${frentes.length})`],['modulos',`Módulos (${modulos.length})`],['roadmap',`Roadmap — ${boardName||'Trello'} (${roadmapItems.length}/${allItems.length})`]].map(([id,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{padding:'10px 16px',fontSize:12,fontWeight:700,border:'none',borderBottom:`2px solid ${tab===id?'#3b82f6':'transparent'}`,background:'none',color:tab===id?'#3b82f6':'#94a3b8',cursor:'pointer',transition:'color .15s'}}>{lbl}</button>
      ))}
    </div>

    {/* FRENTES TAB */}
    {tab==='frentes'&&<div style={{padding:20}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        <button onClick={()=>setFilterGrupo(0)} style={{padding:'4px 12px',borderRadius:20,fontSize:10.5,fontWeight:700,cursor:'pointer',border:`1.5px solid ${filterGrupo===0?'#3b82f6':'#e2e8f0'}`,background:filterGrupo===0?'#3b82f6':'#fff',color:filterGrupo===0?'#fff':'#64748b'}}>Todos ({frentes.length})</button>
        {GRUPOS.map(g=>(
          <button key={g.id} onClick={()=>setFilterGrupo(g.id)} style={{padding:'4px 12px',borderRadius:20,fontSize:10.5,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',border:`1.5px solid ${filterGrupo===g.id?g.cor:'#e2e8f0'}`,background:filterGrupo===g.id?g.cor:'#fff',color:filterGrupo===g.id?'#fff':'#64748b'}}>
            G{g.id} ({frentes.filter(f=>f.grupo===g.id).length})</button>
        ))}
      </div>
      <div className="fb-scroll" style={{overflowX:'auto',overflowY:'auto',position:'relative',maxHeight:'calc(100vh - 185px)'}}>
        <Arrows frentes={visFrente} refs={refs} show={showDeps} hov={hov}/>
        <div style={{display:'flex',gap:14,alignItems:'flex-start',minWidth:shownGrupos.length*280,paddingBottom:8}}>
          {shownGrupos.map(g=>{
            const gf=visFrente.filter(f=>f.grupo===g.id),over=dragOver===g.id;
            return(<div key={g.id}
              onDragOver={e=>{e.preventDefault();setDragOver(g.id);}}
              onDragLeave={()=>setDragOver(null)}
              onDrop={e=>{e.preventDefault();if(dragId.current)setFreentes(frentes.map(f=>f.id===dragId.current?{...f,grupo:g.id}:f));setDragOver(null);}}
              style={{flex:filterGrupo!==0?'1':'0 0 272px',minWidth:272,background:over?g.soft:'#f8fafc',border:`2px solid ${over?g.cor:g.border}`,borderRadius:12,overflow:'hidden',transition:'all .15s'}}>
              <div style={{padding:'9px 11px 7px',background:g.soft,borderBottom:`1px solid ${g.border}`,display:'flex',alignItems:'center',gap:7}}>
                <span style={{width:7,height:7,borderRadius:'50%',background:g.cor,flexShrink:0}}/>
                <span style={{fontSize:10.5,fontWeight:800,color:g.cor,flex:1,lineHeight:1.3}}>G{g.id} — {g.nome}</span>
                <span style={{fontSize:9.5,padding:'1px 6px',borderRadius:20,background:`${g.cor}22`,color:g.cor,fontWeight:700}}>{gf.length}</span>
              </div>
              <div style={{padding:'7px 7px',display:'flex',flexDirection:'column',gap:6}}>
                {gf.map(f=><FCard key={f.id} f={f} g={g} all={frentes} refs={refs} hov={hov} setHov={setHov} onEdit={setEditing} onDel={id=>{if(confirm('Remover?'))setFreentes(frentes.filter(f=>f.id!==id));}} onDrill={setDrill} dragH={dragH}/>)}
                {gf.length===0&&<div style={{padding:'18px 0',textAlign:'center',color:'#cbd5e1',fontSize:11}}>{over?'Soltar aqui':'Arraste frentes aqui'}</div>}
              </div>
            </div>);})}
        </div>
      </div>
    </div>}

    {/* MODULOS TAB */}
    {tab==='modulos'&&<ModulosView
      items={allItems}
      modulos={modulos}
      onUpdate={m=>setModulos(modulos.map(x=>x.id===m.id?m:x))}
      onAdd={m=>{const mx=Math.max(...modulos.map(x=>x.num),0);setModulos([...modulos,{...m,id:`m${Date.now()}`,num:mx+1}]);}}
      onDelete={id=>setModulos(modulos.filter(m=>m.id!==id))}
      onDrillDown={openRoadmapFromModulo}
    />}

    {/* ROADMAP TAB */}
    {tab==='roadmap'&&<div style={{padding:20}}>

      {/* Stats bar */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:16}}>
        {[
          ['Total ativo',allItems.filter(i=>i.active).length,'#1e293b','active','Ver todos os cards ativos'],
          ['Validar Publicado',allItems.filter(i=>i.status==='Validar no Publicado').length,'#ef4444','validar','Ver cards aguardando validação no publicado'],
          ['Em andamento',allItems.filter(i=>['Em andamento','Em teste'].includes(i.status)).length,'#22c55e','andamento','Ver cards em desenvolvimento ou em teste'],
          ['Aguardando',allItems.filter(i=>['Aguardando Aprovação','Aprovado'].includes(i.status)).length,'#3b82f6','pendente','Ver cards aguardando aprovação ou aprovados'],
          ['Sem estimativa',allItems.filter(i=>i.active&&i.semEstimativa).length,'#94a3b8','semest','Cards sem duração definida — período calculado automaticamente por status'],
        ].map(([l,v,c,fkey,tip])=>(
          <div key={l} title={tip} style={{background:'#fff',border:`1px solid ${filterStatus===fkey?c:'#e2e8f0'}`,borderRadius:10,padding:'10px 14px',cursor:'pointer',transition:'border-color .15s'}} onClick={()=>{
            if(fkey==='semest'){setFilterStatus('semest');setActiveFrente(null);}
            else if(fkey==='validar')setFilterStatus('validar');
            else if(fkey==='andamento')setFilterStatus('andamento');
            else if(fkey==='pendente')setFilterStatus('pendente');
            else setFilterStatus('active');
            setActiveFrente(null);
            setRoadmapView('detail');
          }}>
            <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:9.5,color:'#94a3b8',marginTop:2}}>{l}</div>
          </div>))}
      </div>

      {/* Toggle Macro / Detalhada */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{display:'flex',background:'#f1f5f9',borderRadius:10,padding:3,gap:2}}>
            <button onClick={()=>setRoadmapView('macro')}
              style={{padding:'6px 16px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',transition:'all .15s',
                background:roadmapView==='macro'?'#fff':'transparent',
                color:roadmapView==='macro'?'#1e293b':'#94a3b8',
                boxShadow:roadmapView==='macro'?'0 1px 4px #0001':'none'}}>
              Visão Macro
            </button>
            <button onClick={()=>setRoadmapView('detail')}
              style={{padding:'6px 16px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',transition:'all .15s',
                background:roadmapView==='detail'?'#fff':'transparent',
                color:roadmapView==='detail'?'#1e293b':'#94a3b8',
                boxShadow:roadmapView==='detail'?'0 1px 4px #0001':'none'}}>
              Visão Detalhada
            </button>
          </div>
          {roadmapView==='macro'&&<span style={{fontSize:11,color:'#94a3b8'}}>Clique numa frente para ver os cards</span>}
        </div>
        {roadmapView==='detail'&&activeFrente&&(
          <button title='Voltar para a visão consolidada das frentes de ação' onClick={()=>{setActiveFrente(null);setFilterFeature('all');setRoadmapView('macro');}}
            style={{padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,border:'1.5px solid #e2e8f0',background:'#fff',color:'#64748b',cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
            ← Voltar para Macro
          </button>
        )}
      </div>

      {/* MACRO VIEW */}
      {roadmapView==='macro'&&(
        <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
          <MacroView items={allItems} frentes={frentes} onDrillDown={f=>{setActiveFrente(f);setFilterFeature(f.titulo);setRoadmapView('detail');}}/>
        </div>
      )}

      {/* DETAIL VIEW */}
      {roadmapView==='detail'&&<>

      {/* Módulo banner — só aparece quando vem de drill down de módulo */}
      {activeModulo&&(
        <div style={{background:`${activeModulo.cor}10`,border:`1.5px solid ${activeModulo.cor}40`,borderRadius:12,padding:'14px 18px',marginBottom:14,display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:40,height:40,borderRadius:10,background:activeModulo.cor,color:'#fff',fontWeight:800,fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {activeModulo.num}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontWeight:800,fontSize:15,color:'#1e293b'}}>{activeModulo.titulo}</span>
              <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:activeModulo.cor,color:'#fff',fontWeight:700}}>Módulo</span>
              <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,
                background:activeModulo.status==='Em andamento'?'#f0fdf4':'#f8fafc',
                color:activeModulo.status==='Em andamento'?'#166534':'#64748b',fontWeight:700}}>
                {activeModulo.status}
              </span>
            </div>
            <div style={{fontSize:12,color:'#64748b'}}>{activeModulo.desc}</div>
          </div>
          <button title="Voltar para o board de Módulos"
            onClick={()=>{setActiveModulo(null);setRoadmapView('macro');setTab('modulos');}}
            style={{padding:'7px 14px',borderRadius:8,border:`1.5px solid ${activeModulo.cor}`,background:'#fff',color:activeModulo.cor,fontWeight:700,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
            ← Módulos
          </button>
        </div>
      )}
      {activeFrente&&(()=>{
        const g=GRUPOS.find(x=>x.id===activeFrente.grupo)||GRUPOS[0];
        const rs=RISCO_S[activeFrente.risco]||RISCO_S.MEDIO;
        const ps=PRIOR_S[activeFrente.prioridade]||PRIOR_S.MEDIA;
        return(
          <div style={{background:`${g.cor}10`,border:`1.5px solid ${g.cor}40`,borderRadius:12,padding:'14px 18px',marginBottom:14,display:'flex',alignItems:'center',gap:14}}>
            <div style={{width:40,height:40,borderRadius:10,background:g.cor,color:'#fff',fontWeight:800,fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {activeFrente.num}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                <span style={{fontWeight:800,fontSize:15,color:'#1e293b'}}>{activeFrente.titulo}</span>
                <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:g.cor,color:'#fff',fontWeight:700}}>G{g.id} — {g.nome}</span>
                <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:ps.bg,color:ps.text,fontWeight:700}}>{activeFrente.prioridade}</span>
                <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:rs.bg,color:rs.text,fontWeight:700,display:'flex',alignItems:'center',gap:3}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:rs.dot,display:'inline-block'}}/>
                  {activeFrente.risco}
                </span>
              </div>
              <div style={{fontSize:12,color:'#64748b'}}>{activeFrente.desc}</div>
            </div>
            <button
              title="Voltar para o board de Frentes de Ação"
              onClick={()=>{setActiveFrente(null);setFilterFeature('all');setRoadmapView('macro');setTab('frentes');}}
              style={{padding:'7px 14px',borderRadius:8,border:`1.5px solid ${g.cor}`,background:'#fff',color:g.cor,fontWeight:700,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
              ← Frentes
            </button>
          </div>
        );
      })()}
      {/* Filters */}
      <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',whiteSpace:'nowrap'}}>Status</span>

        {/* Todos */}
        <button onClick={()=>setFilterStatus('all')}
          style={{padding:'3px 10px',borderRadius:20,fontSize:10.5,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',
            border:`1.5px solid ${filterStatus==='all'&&!activeFrente?'#3b82f6':'#e2e8f0'}`,
            background:filterStatus==='all'&&!activeFrente?'#3b82f6':'#fff',
            color:filterStatus==='all'&&!activeFrente?'#fff':'#64748b'}}>
          Todos ({allItems.length})
        </button>

        {/* Ativos */}
        <button onClick={()=>setFilterStatus('active')}
          style={{padding:'3px 10px',borderRadius:20,fontSize:10.5,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',
            border:`1.5px solid ${filterStatus==='active'&&!activeFrente?'#3b82f6':'#e2e8f0'}`,
            background:filterStatus==='active'&&!activeFrente?'#3b82f6':'#fff',
            color:filterStatus==='active'&&!activeFrente?'#fff':'#64748b'}}
          title="Todos os cards em andamento — exclui Concluídos e Cancelados">
          Ativos ({allItems.filter(i=>i.active).length})
        </button>

        <div style={{width:1,height:16,background:'#e2e8f0',margin:'0 2px'}}/>

        {/* Dynamic status buttons from actual data */}
        {[...new Set(allItems.map(i=>i.status))]
          .filter(s=>s&&s!=='Outros')
          .sort((a,b)=>{
            const order=['Validar no Publicado','Para publicar','Em andamento','Em teste','Aprovado','Aguardando Aprovação','Pendente','Backlog','StandBy','Concluído','Cancelado'];
            return (order.indexOf(a)||99)-(order.indexOf(b)||99);
          })
          .map(s=>{
            const ss=STATUS_STYLE[s]||{bg:'#f8fafc',text:'#64748b',dot:'#94a3b8'};
            const count=allItems.filter(i=>i.status===s).length;
            const isActive=filterStatus===s&&!activeFrente;
            return(
              <button key={s} onClick={()=>setFilterStatus(s)}
                title={STATUS_TOOLTIP[s]||s}
                style={{padding:'3px 10px',borderRadius:20,fontSize:10.5,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',
                  border:`1.5px solid ${isActive?ss.dot:'#e2e8f0'}`,
                  background:isActive?ss.bg:'#fff',
                  color:isActive?ss.text:'#64748b',
                  display:'flex',alignItems:'center',gap:4}}>
                {isActive&&<span style={{width:5,height:5,borderRadius:'50%',background:ss.dot,display:'inline-block'}}/>}
                {s} ({count})
              </button>
            );
          })}

        <div style={{width:1,height:16,background:'#e2e8f0',margin:'0 2px'}}/>
        <span style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',whiteSpace:'nowrap'}}>Feature</span>
        <select value={activeFrente?activeFrente.titulo:filterFeature} onChange={e=>{setFilterFeature(e.target.value);setActiveFrente(null);}}
          style={{fontSize:11,border:'1.5px solid #e2e8f0',borderRadius:8,padding:'4px 8px',background:'#fff',color:'#475569',outline:'none'}}>
          <option value="all">Todas as áreas</option>
          {features.map(f=><option key={f}>{f}</option>)}
        </select>
        <span style={{fontSize:9.5,color:'#94a3b8',marginLeft:'auto'}}>{roadmapItems.length} cards</span>
      </div>

      <RoadmapBoard items={roadmapItems} onPatch={patchItem} onCardClick={setSelectedCard} onMoveCard={setMoveCardModal}/>
      </>}
    </div>}

    {/* MODALS */}
    {editing!==null&&<EditModal f={editing} all={frentes} onSave={saveFrente} onClose={()=>setEditing(null)}/>}
    {drill&&<DrillPanel f={drill} all={frentes} onClose={()=>setDrill(null)} onOpenRoadmap={openRoadmap}/>}
    {selectedCard&&<CardDetail card={selectedCard} onClose={()=>setSelectedCard(null)}/>}
    {moveCardModal&&<MoveModal card={moveCardModal} frentes={frentes} onMove={moveCardToFrente} onClose={()=>setMoveCardModal(null)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
